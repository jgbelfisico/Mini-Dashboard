<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <div id="dashboard">

      <header class="dashboard-header">
        <h1>Mi Dashboard</h1>
        <p id="greeting" class="greeting"></p>
        <button id="theme-btn" class="theme-btn" type="button">☀️</button>
      </header>

      <main class="dashboard-grid">

        <!-- Tarjeta: Fecha y hora -->
        <section class="card" id="card-clock">
          <h2 class="card-title">Fecha y hora</h2>
          <div class="card-body">
            <p id="clock-time" class="clock-time">--:--:--</p>
            <p id="clock-date" class="clock-date">cargando fecha...</p>
          </div>
        </section>

        <!-- Tarjeta: Clima -->
        <section class="card" id="card-weather">
          <h2 class="card-title">Clima</h2>
          <div class="card-body">
            <div class="weather-search">
              <input
                type="text"
                id="weather-input"
                class="input"
                placeholder="Escribe una ciudad..."
              />
              <button id="weather-btn" class="btn" type="button">Buscar</button>
            </div>
            <p id="weather-loading" class="weather-loading hidden">Buscando ciudad...</p>
            <div id="weather-result" class="weather-result hidden">
              <div class="weather-main">
                <span id="weather-icon" class="weather-icon">🌤</span>
                <span id="weather-temp" class="weather-temp">--°C</span>
              </div>
              <div class="weather-details">
                <span id="weather-city" class="weather-city">--</span>
                <span id="weather-desc" class="weather-desc">--</span>
                <span id="weather-wind" class="weather-wind">💨 -- km/h</span>
              </div>
            </div>
            <p id="weather-error" class="error-msg hidden"></p>
            <div id="weather-history" class="weather-history hidden">
              <p class="weather-history-label">Recientes</p>
              <div id="weather-history-list" class="weather-history-list"></div>
            </div>
          </div>
        </section>

        <!-- Tarjeta: Tareas -->
        <section class="card card--full" id="card-tasks">
          <h2 class="card-title">Tareas <span id="tasks-counter" class="tasks-counter hidden"></span></h2>
          <div class="card-body">
            <form id="tasks-form" class="tasks-form">
              <input
                type="text"
                id="tasks-input"
                class="input"
                placeholder="Nueva tarea..."
              />
              <button type="submit" class="btn">Agregar</button>
            </form>
            <ul id="tasks-list" class="tasks-list">
              <!-- Las tareas se renderizan aquí con JavaScript -->
            </ul>
            <p id="tasks-empty" class="tasks-empty">No hay tareas. ¡Agrega una!</p>
          </div>
        </section>

      </main>

    </div>

    <script src="js/theme.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/weather.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
